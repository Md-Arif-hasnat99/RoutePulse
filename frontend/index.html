<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoutePulse Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#fdf8f8",
                        "primary-fixed": "#e5e2e1",
                        "surface-container-high": "#ebe7e7",
                        "border-light": "#e0e0e0",
                        "on-secondary-container": "#646464",
                        "inverse-on-surface": "#f4f0ef",
                        "risk-low-tint": "#e8f5e9",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-secondary-fixed": "#1b1c1c",
                        "surface-container": "#f1edec",
                        "surface-tint": "#5f5e5e",
                        "surface-container-low": "#f7f3f2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1c1b1b",
                        "tertiary-fixed": "#e6e2e0",
                        "on-primary-fixed-variant": "#474746",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "surface-dim": "#ddd9d8",
                        "tertiary": "#0c0c0b",
                        "secondary-fixed": "#e4e2e2",
                        "secondary-container": "#e4e2e2",
                        "risk-high": "#d32f2f",
                        "background-card": "#ffffff",
                        "on-primary-container": "#8a8989",
                        "inverse-primary": "#c8c6c5",
                        "inverse-surface": "#313030",
                        "tertiary-container": "#232221",
                        "risk-medium": "#f57c00",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#444748",
                        "primary": "#0b0c0c",
                        "on-background": "#1c1b1b",
                        "on-tertiary-fixed": "#1c1b1a",
                        "tertiary-fixed-dim": "#c9c6c4",
                        "surface-container-highest": "#e5e2e1",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#1b1c1c",
                        "background": "#fdf8f8",
                        "on-tertiary-fixed-variant": "#484645",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#8c8987",
                        "surface": "#fdf8f8",
                        "risk-low": "#2e7d32",
                        "surface-variant": "#e5e2e1",
                        "secondary-fixed-dim": "#c8c6c6",
                        "on-secondary-fixed-variant": "#464747",
                        "background-main": "#f7f7f7",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c4c7c7",
                        "outline": "#747878",
                        "primary-container": "#222222",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "24px",
                        "panel-gap": "24px",
                        "stack-gap": "12px",
                        "nav-height": "56px",
                        "card-padding": "16px"
                    },
                    "fontFamily": {
                        "nav-logo": ["Inter"],
                        "body-bold": ["Inter"],
                        "label-caps": ["Inter"],
                        "heading-md": ["Inter"],
                        "body-regular": ["Inter"],
                        "heading-lg": ["Inter"],
                        "data-point": ["Inter"]
                    },
                    "fontSize": {
                        "nav-logo": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-bold": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "heading-md": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-regular": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "heading-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "data-point": ["13px", {"lineHeight": "18px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e0e0e0;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #c8c6c5;
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
